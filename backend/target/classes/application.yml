server:
  port: 8081

spring:
  application:
    name: kb-backend
  datasource:
    url: jdbc:postgresql://localhost:5432/kb_system
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  sql:
    init:
      mode: always
      schema-locations: classpath:schema.sql
      data-locations: classpath:data.sql

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true

jwt:
  issuer: kb-system
  access-token-expire-seconds: 7200
  refresh-token-expire-seconds: 604800
  secret: kb-system-demo-secret-key-please-change-in-prod-123456

app:
  upload:
    max-size-bytes: 10485760
    allowed-exts: md,pdf,docx
  ai:
    # OpenAI 兼容接口地址（可接阿里云通义千问兼容模式或本地网关）
    base-url: https://dashscope.aliyuncs.com/compatible-mode/v1
    # 请替换为真实 key，生产环境建议使用环境变量注入
    api-key: sk-3d2c8b97b3884b58bf12d5ad76ee5ea7
    embedding-model: text-embedding-v2
    embedding-dim: 1536
    chat-model: qwen-plus
    timeout-ms: 30000

