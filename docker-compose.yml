version: "3.9"

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: kb-system-postgres
    environment:
      POSTGRES_DB: kb_system
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - kb_system_pgdata:/var/lib/postgresql/data

volumes:
  kb_system_pgdata:
